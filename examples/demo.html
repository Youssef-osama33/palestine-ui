<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>palestine-ui — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Inline tokens (no bundler needed for demo) ── */
      :root {
        --pl-black: #0d0d0d;
        --pl-white: #f5f0e8;
        --pl-green: #1b5e3b;
        --pl-green-light: #2e8b5a;
        --pl-red: #b5202a;
        --pl-sand: #c9b99a;
        --pl-olive: #6b7c3a;
        --pl-font-arabic: "Amiri", serif;
        --pl-radius-md: 8px;
        --pl-radius-lg: 12px;
        --pl-ease: cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--pl-white);
        color: var(--pl-black);
        font-family: var(--pl-font-arabic);
        line-height: 1.7;
        text-align: center;
      }

      /* ── Hero ── */

      .black {
        background: #0d0d0d;
      }
      .white {
        background: #f5f0e8;
      }
      .green {
        background: #1b5e3b;
      }
      .red {
        background: #b5202a;
      }
      .hero {
        background: var(--pl-black);
        color: var(--pl-white);
        padding: 60px 24px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .hero-kuffiyeh {
        position: absolute;
        inset: 0;
        opacity: 0.08;
      }

      .hero h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
        position: relative;
      }

      .hero p {
        font-size: 1.1rem;
        color: var(--pl-sand);
        margin-top: 12px;
        position: relative;
      }

      .flag-bar {
        height: 6px;
        display: flex;
      }
      .flag-bar span {
        flex: 1;
      }

      /* ── Layout ── */
      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      .section-title {
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 20px;
        padding-bottom: 8px;
        border-bottom: 2px solid var(--pl-green);
        display: inline-block;
      }

      section {
        margin-bottom: 56px;
      }

      /* ── Color Grid ── */
      .color-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
      }

      .color-card {
        border-radius: var(--pl-radius-lg);
        overflow: hidden;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .color-swatch {
        height: 70px;
      }

      .color-meta {
        padding: 10px 12px;
        background: white;
      }

      .color-name {
        font-size: 13px;
        font-weight: 600;
        display: block;
      }

      .color-hex {
        font-family: monospace;
        font-size: 11px;
        color: #666;
      }

      /* ── Icons Grid ── */
      .icons-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 12px;
      }

      .icon-card {
        background: white;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: var(--pl-radius-lg);
        padding: 20px 12px;
        text-align: center;
        cursor: pointer;
        transition: all 200ms var(--pl-ease);
      }

      .icon-card:hover {
        border-color: var(--pl-green);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(27, 94, 59, 0.15);
      }

      .icon-card svg {
        display: block;
        margin: 0 auto 8px;
      }

      .icon-name {
        font-size: 11px;
        color: #666;
        font-family: monospace;
      }

      /* ── Kuffiyeh Section ── */
      .kuffiyeh-preview {
        border-radius: var(--pl-radius-lg);
        overflow: hidden;
        margin-bottom: 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .style-buttons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .style-btn {
        font-family: monospace;
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #ddd;
        background: white;
        cursor: pointer;
        transition: all 150ms;
      }

      .style-btn.active,
      .style-btn:hover {
        background: var(--pl-green);
        border-color: var(--pl-green);
        color: white;
      }

      /* ── Buttons Demo ── */
      .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .pl-btn {
        padding: 10px 22px;
        border: none;
        border-radius: var(--pl-radius-md);
        font-family: var(--pl-font-arabic);
        font-size: 15px;
        cursor: pointer;
        transition: all 200ms var(--pl-ease);
      }

      .pl-btn-green {
        background: var(--pl-green);
        color: var(--pl-white);
      }
      .pl-btn-green:hover {
        background: var(--pl-green-light);
      }

      .pl-btn-red {
        background: var(--pl-red);
        color: var(--pl-white);
      }
      .pl-btn-red:hover {
        filter: brightness(1.1);
      }

      .pl-btn-outline {
        background: transparent;
        border: 1.5px solid var(--pl-green);
        color: var(--pl-green);
      }
      .pl-btn-outline:hover {
        background: var(--pl-green);
        color: var(--pl-white);
      }

      /* ── Badge ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 13px;
      }
      .badge-green {
        background: var(--pl-green);
        color: white;
      }
      .badge-red {
        background: var(--pl-red);
        color: white;
      }
      .badge-olive {
        background: var(--pl-olive);
        color: white;
      }

      .badge-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .buttons {
        margin-bottom: 12px;
        font-weight: 600;
      }

      /* ── Footer ── */
      footer {
        text-align: center;
        padding: 32px 24px;
        background: var(--pl-black);
        color: var(--pl-sand);
        font-size: 14px;
      }

      footer a {
        color: var(--pl-green-light);
        text-decoration: none;
      }
      .footer-links {
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <!-- Hero -->
    <div class="flag-bar">
      <span class="black"></span>
      <span class="white"></span>
      <span class="green"></span>
      <span class="red"></span>
    </div>

    <div class="hero">
    <canvas id="hero-canvas" class="hero-kuffiyeh"></canvas>
      <h1>palestine ui</h1>
      <p>Design system for Palestine — colors · icons · kuffiyeh · utilities</p>
    </div>

    <div class="container">
      <!-- Colors -->
      <section>
        <div class="section-title">🎨 Color Tokens</div>
        <div class="color-grid" id="color-grid"></div>
      </section>

      <!-- Kuffiyeh -->
      <section>
        <div class="section-title">🧣 Kuffiyeh Generator</div>
        <div class="kuffiyeh-preview">
          <canvas id="kuffiyeh-canvas" width="860" height="120"></canvas>
        </div>
        <div class="style-buttons" id="style-buttons"></div>
      </section>

      <!-- Icons -->
      <section>
        <div class="section-title">🖼 Icons</div>
        <div class="icons-grid" id="icons-grid"></div>
      </section>

      <!-- UI Components -->
      <section>
        <div class="section-title">⚡ Components</div>

        <p class="buttons">Buttons</p>
        <div class="btn-row">
          <button class="pl-btn pl-btn-green">حرية فلسطين</button>
          <button class="pl-btn pl-btn-red">العودة</button>
          <button class="pl-btn pl-btn-outline">المقاومة</button>
        </div>

        <p class="buttons">Badges</p>
        <div class="badge-row">
          <span class="badge badge-green">🫒 زيتون</span>
          <span class="badge badge-red">🍉 بطيخة</span>
          <span class="badge badge-olive">🌾 قمح</span>
        </div>
      </section>
    </div>

    <footer>
      <p>palestine-ui · MIT License</p>
      <p class="footer-links">
        <a href="https://github.com/Youssef-osama33/palestine-ui">GitHub</a>
        · Free Palestine 🇵🇸
      </p>
    </footer>

    <script>
      // ── Inline palestine-ui logic (no bundler for demo) ──────────

      const COLORS = [
        { name: "Black", hex: "#0D0D0D", var: "--pl-black" },
        { name: "White", hex: "#F5F0E8", var: "--pl-white" },
        { name: "Green", hex: "#1B5E3B", var: "--pl-green" },
        { name: "Red", hex: "#B5202A", var: "--pl-red" },
        { name: "Sand", hex: "#C9B99A", var: "--pl-sand" },
        { name: "Olive", hex: "#6B7C3A", var: "--pl-olive" },
        { name: "Green Light", hex: "#2E8B5A", var: "--pl-green-light" },
        { name: "Sky", hex: "#A8C8E8", var: "--pl-sky" },
      ];

      const ICONS = {
        olive: {
          ar: "غصن زيتون",
          paths: `
    <path d="M12 21C12 21 7 16 7 11C7 7.5 9.5 5.5 12 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M12 21C12 21 17 16 17 11C17 7.5 14.5 5.5 12 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <ellipse cx="8.5" cy="9" rx="2.2" ry="1.4" fill="currentColor" transform="rotate(-30 8.5 9)" opacity="0.9"/>
    <ellipse cx="15.5" cy="9" rx="2.2" ry="1.4" fill="currentColor" transform="rotate(30 15.5 9)" opacity="0.9"/>
    <ellipse cx="9" cy="13.5" rx="2" ry="1.3" fill="currentColor" transform="rotate(-20 9 13.5)" opacity="0.7"/>
    <ellipse cx="15" cy="13.5" rx="2" ry="1.3" fill="currentColor" transform="rotate(20 15 13.5)" opacity="0.7"/>`,
        },
        key: {
          ar: "مفتاح العودة",
          paths: `
    <circle cx="9" cy="10" r="4.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <circle cx="9" cy="10" r="1.8" fill="currentColor"/>
    <line x1="13.5" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18.5" y1="10" x2="18.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21" y1="10" x2="21" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`,
        },
        dome: {
          ar: "قبة الصخرة",
          paths: `
    <line x1="12" y1="2" x2="12" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10.8" y1="3" x2="13.2" y2="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M12 4.5C12 4.5 8.5 8 8.5 10.5L15.5 10.5C15.5 8 12 4.5 12 4.5Z" fill="currentColor" opacity="0.8"/>
    <rect x="7" y="10.5" width="10" height="3.5" rx="0.5" fill="currentColor" opacity="0.7"/>
    <rect x="5" y="14" width="14" height="5" rx="0.5" fill="currentColor" opacity="0.6"/>`,
        },
        map: {
          ar: "خريطة فلسطين",
          paths: `
    <path d="M11.5 3.5C9.5 3.5 7.5 5.5 7.5 7.5C7.5 8.5 8.5 9.5 8.5 10.5C8.5 11.5 7.5 12.5 7.5 13.5C7.5 15.5 8.5 16.5 9.5 17.5C9.5 18.5 9.5 19.5 10.5 20.5C11.5 21.5 12.5 20.5 12.5 19.5C13.5 18.5 14.5 17.5 15.5 16.5C16.5 15.5 16.5 14.5 16.5 13.5C16.5 12.5 15.5 11.5 15.5 10.5C16.5 9.5 17.5 8.5 17.5 7.5C17.5 5.5 15.5 3.5 13.5 3.5Z" fill="currentColor" opacity="0.85"/>
    <circle cx="12" cy="12" r="1.3" fill="white" opacity="0.9"/>`,
        },
        watermelon: {
          ar: "بطيخة",
          paths: `
    <path d="M5 17C5 13 8.5 6.5 12 5.5C15.5 6.5 19 13 19 17Z" fill="currentColor" opacity="0.3"/>
    <path d="M6.5 17C6.5 13.5 9.5 8 12 7C14.5 8 17.5 13.5 17.5 17Z" fill="currentColor" opacity="0.85"/>
    <line x1="5" y1="17" x2="19" y2="17" stroke="currentColor" stroke-width="1.2"/>
    <circle cx="10" cy="13.5" r="0.7" fill="white"/>
    <circle cx="12" cy="11.5" r="0.7" fill="white"/>
    <circle cx="14" cy="13.5" r="0.7" fill="white"/>`,
        },
        flag: {
          ar: "علم فلسطين",
          paths: `
    <line x1="4" y1="3" x2="4" y2="21" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <rect x="4" y="5" width="16" height="4.3" fill="currentColor" opacity="0.9"/>
    <rect x="4" y="9.3" width="16" height="4.3" fill="currentColor" opacity="0.4"/>
    <rect x="4" y="13.7" width="16" height="4.3" fill="currentColor" opacity="0.7"/>
    <path d="M4 5L9.5 12L4 19Z" fill="currentColor"/>`,
        },
        wheat: {
          ar: "قمح",
          paths: `
    <line x1="12" y1="21" x2="12" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <ellipse cx="12" cy="7" rx="1.8" ry="2.8" fill="currentColor" opacity="0.9"/>
    <ellipse cx="9.5" cy="10" rx="1.8" ry="2.2" fill="currentColor" transform="rotate(-35 9.5 10)" opacity="0.85"/>
    <ellipse cx="14.5" cy="10" rx="1.8" ry="2.2" fill="currentColor" transform="rotate(35 14.5 10)" opacity="0.85"/>`,
        },
        mosque: {
          ar: "مسجد",
          paths: `
    <line x1="12" y1="2" x2="12" y2="4.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <line x1="10.8" y1="3.2" x2="13.2" y2="3.2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <path d="M9 4.5C9 4.5 7 7 7 9.5L17 9.5C17 7 15 4.5 15 4.5C14 6 12 6.5 12 6.5C12 6.5 10 6 9 4.5Z" fill="currentColor" opacity="0.75"/>
    <rect x="6" y="9.5" width="12" height="3" rx="0.5" fill="currentColor" opacity="0.65"/>
    <rect x="4" y="12.5" width="16" height="6" rx="0.5" fill="currentColor" opacity="0.55"/>
    <rect x="10" y="14.5" width="4" height="4" rx="0.5" fill="currentColor"/>`,
        },
      };

      const PALETTES = {
        classic: { c1: "#0D0D0D", c2: "#F5F0E8", c3: "#1B5E3B" },
        red: { c1: "#B5202A", c2: "#F5F0E8", c3: "#0D0D0D" },
        olive: { c1: "#6B7C3A", c2: "#C9B99A", c3: "#0D0D0D" },
        fine: { c1: "#0D0D0D", c2: "#F5F0E8", c3: "#B5202A" },
        dense: { c1: "#0D0D0D", c2: "#1B5E3B", c3: "#F5F0E8" },
      };

      // ── Render Colors ─────────────────────────────────────────────
      const colorGrid = document.getElementById("color-grid");
      COLORS.forEach(({ name, hex, var: v }) => {
        const isDark =
          parseInt(hex.slice(1, 3), 16) * 0.299 +
            parseInt(hex.slice(3, 5), 16) * 0.587 +
            parseInt(hex.slice(5, 7), 16) * 0.114 <
          128;
        colorGrid.innerHTML += `
    <div class="color-card">
      <div class="color-swatch" style="background:${hex}"></div>
      <div class="color-meta">
        <span class="color-name">${name}</span>
        <span class="color-hex">${hex}</span>
      </div>
    </div>`;
      });

      // ── Render Icons ──────────────────────────────────────────────
      const iconsGrid = document.getElementById("icons-grid");
      Object.entries(ICONS).forEach(([name, { ar, paths }]) => {
        iconsGrid.innerHTML += `
    <div class="icon-card" title="${ar}">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="#1B5E3B" color="#1B5E3B">
        ${paths}
      </svg>
      <div class="icon-name">${name}</div>
    </div>`;
      });

      // ── Kuffiyeh Generator ────────────────────────────────────────
      function drawKuffiyeh(style) {
        const canvas = document.getElementById("kuffiyeh-canvas");
        const ctx = canvas.getContext("2d");
        const W = canvas.width,
          H = canvas.height;
        const { c1, c2, c3 } = PALETTES[style];
        const s = style === "fine" ? 8 : style === "dense" ? 12 : 16;

        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = c2;
        ctx.fillRect(0, 0, W, H);

        ctx.lineWidth = s * 0.35;
        for (let x = -(H + s); x < W + H; x += s) {
          ctx.strokeStyle = c1;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + H, H);
          ctx.stroke();
        }
        ctx.lineWidth = s * 0.25;
        for (let x = -(H + s); x < W + H; x += s * 2) {
          ctx.strokeStyle = c3;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + H, H);
          ctx.stroke();
        }
        ctx.fillStyle = c2;
        for (let x = 0; x < W; x += s * 2)
          for (let y = 0; y < H; y += s * 2)
            ctx.fillRect(x, y, s * 0.4, s * 0.4);

        document
          .querySelectorAll(".style-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.style === style),
          );
      }

      // ── Style Buttons ─────────────────────────────────────────────
      const btns = document.getElementById("style-buttons");
      Object.keys(PALETTES).forEach((style) => {
        const btn = document.createElement("button");
        btn.className = "style-btn" + (style === "classic" ? " active" : "");
        btn.dataset.style = style;
        btn.textContent = style;
        btn.onclick = () => drawKuffiyeh(style);
        btns.appendChild(btn);
      });

      // ── Hero Kuffiyeh ─────────────────────────────────────────────
      function drawHero() {
        const c = document.getElementById("hero-canvas");
        c.width = c.offsetWidth;
        c.height = c.offsetHeight;
        const ctx = c.getContext("2d");
        const W = c.width,
          H = c.height,
          s = 20;
        ctx.fillStyle = "#F5F0E8";
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = "#0D0D0D";
        ctx.lineWidth = 6;
        for (let x = -(H + s); x < W + H; x += s) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + H, H);
          ctx.stroke();
        }
      }

      drawHero();
      drawKuffiyeh("classic");
      window.addEventListener("resize", drawHero);
    </script>
  </body>
</html>
